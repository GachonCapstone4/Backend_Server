spring:
  datasource:
    url: jdbc:mysql://localhost:3306/email_agent?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # 운영: validate, 개발: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/gmail.readonly
              - https://www.googleapis.com/auth/calendar

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  expiration: 86400000       # 24시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

app:
  rabbitmq:
    exchange: email.exchange
    queue:
      request: email.request.queue
      response: email.response.queue
    routing-key:
      request: email.request
      response: email.response

  ai:
    server-url: ${AI_SERVER_URL:http://localhost:8000}
    api-key: ${AI_API_KEY:}

  google:
    calendar-id: primary

server:
  port: 8080

logging:
  level:
    com.emailagent: DEBUG
    org.springframework.security: INFO
